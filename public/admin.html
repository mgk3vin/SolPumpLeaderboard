<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LordpommesX2 Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <nav class="topbar" aria-label="Primary navigation">
        <div class="brand">
          <span class="brand-mark">LP</span>
          <span>LordpommesX2 Admin</span>
        </div>
        <a class="kick-link" href="/">Leaderboard</a>
      </nav>

      <section class="leaderboard-section import-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Admin Login</p>
            <h2>Manage Leaderboard</h2>
          </div>
          <button id="signOutButton" type="button" hidden>Sign out</button>
        </div>

        <div class="admin-grid">
          <form id="loginForm" class="admin-box">
            <label for="emailInput">Admin Email</label>
            <div class="admin-row">
              <input id="emailInput" type="email" autocomplete="email" required placeholder="name@example.com" />
              <input
                id="passwordInput"
                type="password"
                autocomplete="current-password"
                required
                placeholder="Password"
              />
              <button type="submit">Sign in</button>
            </div>
          </form>

          <div id="adminPanel" class="admin-box" hidden>
            <span class="admin-label">Signed in as</span>
            <strong id="adminEmail">-</strong>
            <div class="admin-actions">
              <a id="startWeekLink" class="kick-link admin-bookmarklet" href="#">Start New Week</a>
              <a id="bookmarkletLink" class="kick-link admin-bookmarklet" href="#">Refresh Week</a>
            </div>
            <p>
              Drag both buttons into your bookmarks bar. Use Start New Week once with the current
              SolPump standings as baseline, then use Refresh Week for later updates.
            </p>
          </div>
        </div>

        <p id="adminStatus" class="admin-status">Loading admin panel...</p>
      </section>
    </main>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
