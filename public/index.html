<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LordpommesX2 Wager Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <nav class="topbar" aria-label="Primary navigation">
        <div class="brand">
          <span class="brand-mark">LP</span>
          <span>LordpommesX2</span>
        </div>
        <a class="kick-link" href="https://kick.com/LordpommesX2" target="_blank" rel="noreferrer">
          Open Kick
        </a>
      </nav>

      <section class="hero compact-hero">
        <div class="hero-copy">
          <p class="eyebrow">Affiliate Wager Race</p>
          <h1>LordpommesX2 Leaderboard</h1>
          <p>Top 10 SolPump affiliates, ranked by wager.</p>
        </div>

        <div class="hero-panel" aria-label="Leaderboard status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Loading data</span>
        </div>
      </section>

      <section class="podium-section" aria-label="Top 3 affiliates">
        <div class="podium" id="podium">
          <div class="empty-state">Loading podium...</div>
        </div>
      </section>

      <section class="leaderboard-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Main Leaderboard</p>
            <h2>Top 10 Affiliates</h2>
          </div>
          <button id="refreshButton" type="button">Refresh</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Affiliate</th>
                <th>Wager</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody">
              <tr>
                <td colspan="3" class="empty-state">Loading leaderboard...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
